<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doktor Paneli — KIVON Randevu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
    }
  }
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dashboard">
    <aside class="dash-sidebar" id="sidebar">
      <a href="admin.html" class="dash-sidebar-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;vertical-align:middle;margin-right:8px"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        KIVON
      </a>
      <nav class="dash-nav">
        <a href="admin.html" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Randevularim
        </a>
        <a href="profile.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Ayarlar
        </a>
      </nav>
      <div class="dash-sidebar-footer">
        <a href="#" id="logoutBtn" style="color:var(--danger)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;vertical-align:middle;margin-right:8px"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Cikis Yap
        </a>
      </div>
    </aside>

    <main class="dash-main">
      <div class="dash-header">
        <h1>Doktor Paneli</h1>
        <div class="dash-header-right">
          <div class="user-avatar" id="userAvatar">D</div>
        </div>
      </div>

      <div class="admin-controls">
        <div style="display:flex;align-items:center;gap:12px;padding:16px 24px;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:var(--radius)">
          <span style="font-size:14px;color:var(--text-muted)">Musaitlik Durumu:</span>
          <label class="toggle-switch">
            <input type="checkbox" id="availabilityToggle" checked>
            <span class="toggle-slider"></span>
          </label>
          <span id="availabilityStatus" style="font-size:14px;color:var(--success);font-weight:500">Musait</span>
        </div>
        <button class="btn btn-primary" id="generateSlotsBtn">Slot Olustur</button>
        <button class="btn btn-danger" id="deleteSlotsBtn">Slot Kaldir</button>
        <button class="btn btn-outline" id="addAppointmentBtn">Yeni Randevu Ekle</button>
      </div>

      <div class="dash-stats" id="statsContainer">
        <div class="stat-card glass">
          <div class="stat-value" id="statTotal">0</div>
          <div class="stat-label">Toplam Randevu</div>
        </div>
        <div class="stat-card glass">
          <div class="stat-value" id="statToday">0</div>
          <div class="stat-label">Bugun</div>
        </div>
        <div class="stat-card glass">
          <div class="stat-value" id="statPending">0</div>
          <div class="stat-label">Beklemede</div>
        </div>
        <div class="stat-card glass">
          <div class="stat-value" id="statCompleted">0</div>
          <div class="stat-label">Tamamlanan</div>
        </div>
      </div>

      <div class="filter-bar" style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
        <button class="btn btn-sm filter-btn active" data-filter="all" style="background:var(--glass);border:1px solid var(--glass-border);color:var(--text)">Tumu</button>
        <button class="btn btn-sm filter-btn" data-filter="pending" style="background:var(--glass);border:1px solid var(--glass-border);color:var(--text)">Beklemede</button>
        <button class="btn btn-sm filter-btn" data-filter="confirmed" style="background:var(--glass);border:1px solid var(--glass-border);color:var(--text)">Onaylandi</button>
        <button class="btn btn-sm filter-btn" data-filter="cancelled" style="background:var(--glass);border:1px solid var(--glass-border);color:var(--text)">Iptal</button>
        <button class="btn btn-sm filter-btn" data-filter="completed" style="background:var(--glass);border:1px solid var(--glass-border);color:var(--text)">Tamamlandi</button>
        <button class="btn btn-sm" id="refreshBtn" style="margin-left:auto;background:var(--glass);border:1px solid var(--glass-border);color:var(--neon)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;vertical-align:middle;margin-right:4px"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Yenile
        </button>
      </div>

      <div id="todayMini" style="margin-bottom:16px"></div>
      <div id="appointmentsContainer"></div>
    </main>
  </div>

  <div class="modal-overlay" id="generateModal">
    <div class="modal glass" style="position:relative">
      <button class="modal-close">&times;</button>
      <h2>Slot Olustur</h2>
      <form id="generateForm">
        <div class="form-group">
          <label>Baslangic Tarihi</label>
          <input type="date" class="form-input" id="startDate" required>
        </div>
        <div class="form-group">
          <label>Bitis Tarihi</label>
          <input type="date" class="form-input" id="endDate" required>
        </div>
        <button type="submit" class="btn btn-primary form-submit">Olustur</button>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="deleteSlotsModal">
    <div class="modal glass" style="position:relative">
      <button class="modal-close">&times;</button>
      <h2>Slot Kaldir</h2>
      <form id="deleteSlotsForm">
        <div class="form-group">
          <label>Baslangic Tarihi</label>
          <input type="date" class="form-input" id="deleteStartDate" required>
        </div>
        <div class="form-group">
          <label>Bitis Tarihi</label>
          <input type="date" class="form-input" id="deleteEndDate" required>
        </div>
        <button type="submit" class="btn btn-danger form-submit">Kaldir</button>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="addAppointmentModal">
    <div class="modal glass" style="position:relative">
      <button class="modal-close">&times;</button>
      <h2>Yeni Randevu Ekle</h2>
      <form id="addAppointmentForm">
        <div class="form-group">
          <label>Hasta Adi *</label>
          <input type="text" class="form-input" id="patientName" required placeholder="Ad Soyad">
        </div>
        <div class="form-group">
          <label>Hasta Telefon *</label>
          <input type="tel" class="form-input" id="patientPhone" required placeholder="05XX XXX XX XX">
        </div>
        <div class="form-group">
          <label>Tarih *</label>
          <input type="date" class="form-input" id="appointmentDate" required>
        </div>
        <div class="form-group">
          <label>Saat *</label>
          <div id="timeSlotContainer" style="margin-top:8px">
            <p style="color:var(--text-muted);font-size:14px">Once tarih secin</p>
          </div>
        </div>
        <div class="form-group">
          <label>Not (opsiyonel)</label>
          <textarea class="form-input" id="appointmentNotes" rows="2" placeholder="Istege bagli not"></textarea>
        </div>
        <button type="submit" class="btn btn-primary form-submit">Randevu Olustur</button>
      </form>
    </div>
  </div>

  <script type="module">
    import { redirectIfNotAuthenticated, getUser, clearToken } from './js/auth.js';
    import { logout, getAppointments, cancelAppointment, generateSlots, deleteSlots, createAppointment, getAvailability } from './js/api.js';
    import { renderAppointments, cancelBooking } from './js/appointments.js';

    redirectIfNotAuthenticated();

    const user = getUser();
    const avatar = document.getElementById('userAvatar');
    if (user && user.full_name) {
      avatar.textContent = user.full_name.charAt(0).toUpperCase();
    }

    let currentFilter = 'all';
    let allAppointments = [];

    async function loadAppointments() {
      const container = document.getElementById('appointmentsContainer');
      try {
        const data = await getAppointments();
        allAppointments = data.appointments || data || [];

        const today = new Date().toISOString().slice(0, 10);
        const todayApts = allAppointments.filter(a => (a.date || a.appointment_date) === today);
        const total = allAppointments.length;
        const pending = allAppointments.filter(a => (a.status || 'pending').toLowerCase() === 'pending').length;
        const completed = allAppointments.filter(a => (a.status || '').toLowerCase() === 'completed').length;

        document.getElementById('statTotal').textContent = total;
        document.getElementById('statToday').textContent = todayApts.length;
        document.getElementById('statPending').textContent = pending;
        document.getElementById('statCompleted').textContent = completed;

        const todayEl = document.getElementById('todayMini');
        if (todayApts.length) {
          todayEl.innerHTML = `<div class="glass" style="padding:12px 20px;display:flex;align-items:center;gap:12px">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--neon)" stroke-width="2" style="width:18px;height:18px;flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span style="font-size:14px;font-weight:500">Bugun <strong>${todayApts.length}</strong> randevu</span>
            <span style="font-size:13px;color:var(--text-muted)">${todayApts.map(a => a.time || (a.appointment_time || '').slice(0,5)).filter(Boolean).join(', ')}</span>
          </div>`;
        } else {
          todayEl.innerHTML = '';
        }

        renderFilteredAppointments();
      } catch (err) {
        container.innerHTML = `<p style="color:var(--danger);text-align:center;padding:40px">${err.message}</p>`;
      }
    }

    function renderFilteredAppointments() {
      const container = document.getElementById('appointmentsContainer');
      const filtered = currentFilter === 'all' ? allAppointments : allAppointments.filter(a => (a.status || 'pending').toLowerCase() === currentFilter);

      container.innerHTML = '';

      if (!filtered.length) {
        container.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <h3>Randevu bulunamadi</h3>
            <p>Bu filtreye uygun randevu yok.</p>
          </div>
        `;
        return;
      }

      filtered.forEach(apt => {
        const date = new Date(apt.date || apt.appointment_date);
        const day = date.getDate();
        const month = date.toLocaleString('tr-TR', { month: 'short' });
        const time = apt.time || (apt.appointment_time ? apt.appointment_time.slice(0, 5) : '');
        const status = (apt.status || 'pending').toLowerCase();
        const patientName = apt.patient_name || apt.user?.full_name || 'Bilinmeyen Hasta';
        const fullDate = date.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });

        const card = document.createElement('div');
        card.className = 'appointment-card glass animate-fadeIn';
        card.innerHTML = `
          <div class="appointment-date-box">
            <div class="day">${day}</div>
            <div class="month">${month}</div>
          </div>
          <div class="appointment-info">
            <h4>${patientName}</h4>
            <p>${fullDate}</p>
          </div>
          <div class="appointment-time">${time}</div>
          <span class="badge badge-${status}">${statusLabel(status)}</span>
          <div class="appointment-actions">
            ${status === 'pending' || status === 'confirmed' ? `<button class="btn btn-sm btn-danger" data-id="${apt.id || apt.appointment_id}">Iptal</button>` : ''}
          </div>
        `;
        container.appendChild(card);

        const cancelBtn = card.querySelector('.btn-danger');
        if (cancelBtn) {
          cancelBtn.addEventListener('click', async () => {
            if (await cancelBooking(cancelBtn.dataset.id)) {
              loadAppointments();
            }
          });
        }
      });
    }

    function statusLabel(status) {
      const labels = { pending: 'Beklemede', confirmed: 'Onaylandi', cancelled: 'Iptal Edildi', completed: 'Tamamlandi' };
      return labels[status] || status;
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => {
          b.classList.remove('active');
          b.style.background = 'var(--glass)';
          b.style.color = 'var(--text)';
        });
        btn.classList.add('active');
        btn.style.background = 'var(--neon)';
        btn.style.color = 'var(--bg)';
        currentFilter = btn.dataset.filter;
        renderFilteredAppointments();
      });
    });

    document.getElementById('refreshBtn').addEventListener('click', loadAppointments);

    loadAppointments();
    setInterval(loadAppointments, 30000);

    const toggle = document.getElementById('availabilityToggle');
    const statusEl = document.getElementById('availabilityStatus');
    toggle.addEventListener('change', () => {
      if (toggle.checked) {
        statusEl.textContent = 'Musait';
        statusEl.style.color = 'var(--success)';
      } else {
        statusEl.textContent = 'Musait Degil';
        statusEl.style.color = 'var(--danger)';
      }
    });

    const generateModal = document.getElementById('generateModal');
    document.getElementById('generateSlotsBtn').addEventListener('click', () => {
      generateModal.classList.add('open');
      const today = new Date().toISOString().slice(0, 10);
      document.getElementById('startDate').value = today;
      document.getElementById('endDate').value = '';
    });

    generateModal.querySelector('.modal-close').addEventListener('click', () => generateModal.classList.remove('open'));
    generateModal.addEventListener('click', (e) => { if (e.target === generateModal) generateModal.classList.remove('open'); });

    document.getElementById('generateForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Olusturuluyor...';
      try {
        await generateSlots(user?.id || user?.user_id, startDate, endDate);
        generateModal.classList.remove('open');
        loadAppointments();
      } catch (err) {
        alert('Hata: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Olustur';
      }
    });

    const deleteModal = document.getElementById('deleteSlotsModal');
    document.getElementById('deleteSlotsBtn').addEventListener('click', () => {
      deleteModal.classList.add('open');
      document.getElementById('deleteStartDate').value = new Date().toISOString().slice(0, 10);
      document.getElementById('deleteEndDate').value = '';
    });
    deleteModal.querySelector('.modal-close').addEventListener('click', () => deleteModal.classList.remove('open'));
    deleteModal.addEventListener('click', (e) => { if (e.target === deleteModal) deleteModal.classList.remove('open'); });
    document.getElementById('deleteSlotsForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const startDate = document.getElementById('deleteStartDate').value;
      const endDate = document.getElementById('deleteEndDate').value;
      if (!confirm(`${startDate} - ${endDate} arasindaki tum slotlari kaldirmak istediginize emin misiniz?`)) return;
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Kaldiriliyor...';
      try {
        const res = await deleteSlots(startDate, endDate);
        deleteModal.classList.remove('open');
        alert(`Toplam ${res.count || 0} slot kaldirildi`);
        loadAppointments();
      } catch (err) {
        alert('Hata: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Kaldir';
      }
    });

    const addModal = document.getElementById('addAppointmentModal');
    const addForm = document.getElementById('addAppointmentForm');
    let selectedTime = null;

    document.getElementById('addAppointmentBtn').addEventListener('click', () => {
      addModal.classList.add('open');
      const today = new Date().toISOString().slice(0, 10);
      document.getElementById('appointmentDate').value = today;
      document.getElementById('patientName').value = '';
      document.getElementById('patientPhone').value = '';
      document.getElementById('appointmentNotes').value = '';
      selectedTime = null;
      loadAvailableSlots(today);
    });

    addModal.querySelector('.modal-close').addEventListener('click', () => addModal.classList.remove('open'));
    addModal.addEventListener('click', (e) => { if (e.target === addModal) addModal.classList.remove('open'); });

    document.getElementById('appointmentDate').addEventListener('change', (e) => {
      selectedTime = null;
      loadAvailableSlots(e.target.value);
    });

    async function loadAvailableSlots(date) {
      const container = document.getElementById('timeSlotContainer');
      if (!date) {
        container.innerHTML = '<p style="color:var(--text-muted);font-size:14px">Once tarih secin</p>';
        return;
      }
      container.innerHTML = '<div class="spinner"></div>';
      try {
        const res = await getAvailability(user?.id || user?.user_id, date);
        const slots = res.data || [];
        if (!Array.isArray(slots) || !slots.length) {
          container.innerHTML = '<p style="color:var(--text-muted);font-size:14px">Bu tarihte musait saat yok</p>';
          return;
        }
        let html = '<div class="time-slots">';
        slots.forEach(slot => {
          const raw = slot.time || slot.start_time || slot;
          const timeStr = typeof raw === 'string' ? raw.slice(0, 5) : String(raw).slice(0, 5);
          const parts = timeStr.split(':');
          const h = parseInt(parts[0]);
          const m = parseInt(parts[1]) || 0;
          const rounded = m < 15 ? `${String(h).padStart(2,'0')}:00` : m < 45 ? `${String(h).padStart(2,'0')}:30` : `${String(h+1).padStart(2,'0')}:00`;
          html += `<div class="time-slot" data-time="${rounded}">${rounded}</div>`;
        });
        html += '</div>';
        container.innerHTML = html;

        container.querySelectorAll('.time-slot').forEach(el => {
          el.addEventListener('click', () => {
            container.querySelectorAll('.time-slot.selected').forEach(e => e.classList.remove('selected'));
            el.classList.add('selected');
            selectedTime = el.dataset.time;
          });
        });
      } catch (err) {
        container.innerHTML = `<p style="color:var(--danger);font-size:14px">Saatler yuklenemedi: ${err.message}</p>`;
      }
    }

    addForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const patientName = document.getElementById('patientName').value.trim();
      const patientPhone = document.getElementById('patientPhone').value.trim();
      const date = document.getElementById('appointmentDate').value;
      const notes = document.getElementById('appointmentNotes').value.trim();

      if (!patientName) { alert('Hasta adi gerekli'); return; }
      if (!patientPhone) { alert('Hasta telefonu gerekli'); return; }
      if (!selectedTime) { alert('Lutfen bir saat secin'); return; }

      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Olusturuluyor...';
      try {
        await createAppointment({
          appointment_date: date,
          appointment_time: selectedTime,
          patient_name: patientName,
          patient_phone: patientPhone,
          notes: notes || undefined,
        });
        addModal.classList.remove('open');
        alert('Randevu basariyla olusturuldu');
        loadAppointments();
      } catch (err) {
        alert('Hata: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Randevu Olustur';
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      await logout();
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
