<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil — KIVON Randevu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
    }
  }
  </script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .profile-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .profile-card { width: 100%; max-width: 520px; padding: 40px; }
    .profile-card h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .profile-card .sub { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }
    .profile-avatar { width: 64px; height: 64px; border-radius: 16px; background: linear-gradient(135deg, var(--neon), var(--purple)); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800; color: var(--bg); margin-bottom: 16px; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 14px; text-decoration: none; margin-bottom: 24px; padding: 8px 16px; border-radius: 8px; transition: all 0.3s; }
    .back-link:hover { background: var(--glass); color: var(--text); }
    .save-btn { margin-top: 32px; }
    .logout-link { display: flex; align-items: center; gap: 8px; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--glass-border); color: var(--danger); font-size: 14px; text-decoration: none; }
    .logout-link:hover { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="profile-page">
    <div class="auth-canvas" id="authCanvas"></div>
    <div class="profile-card glass">
      <a href="dashboard.html" class="back-link" id="backLink">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Geri Don
      </a>
      <div class="profile-avatar" id="avatarInitial">K</div>
      <h1>Profil</h1>
      <p class="sub">Hesap bilgilerinizi duzenleyin</p>
      <form id="profileForm">
        <div class="form-group">
          <label>Ad Soyad</label>
          <input type="text" class="form-input" id="fullName" required placeholder="Adiniz ve soyadiniz">
        </div>
        <div class="form-group">
          <label>E-posta</label>
          <input type="email" class="form-input" id="email" placeholder="ornek@email.com" disabled style="opacity:0.6">
        </div>
        <div class="form-group">
          <label>Telefon</label>
          <input type="tel" class="form-input" id="phone" placeholder="05XX XXX XX XX">
        </div>
        <div class="form-group">
          <label>Yeni Sifre (opsiyonel)</label>
          <input type="password" class="form-input" id="password" placeholder="Bos birakilirsa degismez" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary form-submit save-btn" id="saveBtn">Kaydet</button>
      </form>
      <a href="#" class="logout-link" id="logoutBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Cikis Yap
      </a>
    </div>
  </div>

  <script type="module">
    import { redirectIfNotAuthenticated, getUser, setUser, clearToken, getToken } from './js/auth.js';
    import { getProfile, updateProfile } from './js/api.js';
    import { logout } from './js/api.js';

    redirectIfNotAuthenticated();
    const user = getUser();

    const avatar = document.getElementById('avatarInitial');
    if (user && user.full_name) avatar.textContent = user.full_name.charAt(0).toUpperCase();

    const backLink = document.getElementById('backLink');
    if (user && user.role === 'doctor') {
      backLink.href = 'admin.html';
    }

    async function loadProfile() {
      try {
        const res = await getProfile();
        const profile = res.data?.profile || res;
        const u = res.data?.user || user;
        if (u) {
          document.getElementById('email').value = u.email || '';
          setUser({ ...u, ...profile });
        }
        if (profile) {
          document.getElementById('fullName').value = profile.full_name || u?.full_name || '';
          document.getElementById('phone').value = profile.phone || u?.phone || '';
          const initial = (profile.full_name || u?.full_name || 'K').charAt(0).toUpperCase();
          avatar.textContent = initial;
        }
      } catch (err) {
        console.error('Profil yuklenemedi:', err);
      }
    }

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.textContent = 'Kaydediliyor...';
      try {
        const fullName = document.getElementById('fullName').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;
        const data = {};
        if (fullName) data.full_name = fullName;
        if (phone) data.phone = phone;
        if (Object.keys(data).length > 0) {
          await updateProfile(data);
        }
        if (password && password.length >= 6) {
          const token = getToken();
          const res = await fetch(`${window.API_BASE_URL || window.location.origin}/api/auth/me`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ password })
          });
          if (!res.ok) throw new Error('Sifre degistirilemedi');
        }
        alert('Profil basariyla guncellendi');
        document.getElementById('password').value = '';
        loadProfile();
      } catch (err) {
        alert('Hata: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Kaydet';
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      await logout();
      window.location.href = 'login.html';
    });

    loadProfile();
  </script>
</body>
</html>
