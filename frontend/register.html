<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kayit Ol — KIVON Randevu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
    }
  }
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-canvas" id="authCanvas"></div>
    <div class="auth-card glass">
      <h1>Kayit Ol</h1>
      <p>KIVON hesabi olusturun</p>
      <form id="registerForm" novalidate>
        <div class="form-group">
          <label>Ad Soyad</label>
          <input type="text" class="form-input" id="fullName" placeholder="Adiniz ve soyadiniz" required>
          <div class="form-error" id="nameError">Ad soyad gerekli</div>
        </div>
        <div class="form-group">
          <label>E-posta</label>
          <input type="email" class="form-input" id="email" placeholder="ornek@email.com" required autocomplete="email">
          <div class="form-error" id="emailError">Gecerli bir e-posta adresi girin</div>
        </div>
        <div class="form-group">
          <label>Telefon</label>
          <input type="tel" class="form-input" id="phone" placeholder="05XX XXX XX XX" required>
          <div class="form-error" id="phoneError">Gecerli bir telefon numarasi girin</div>
        </div>
        <div class="form-group">
          <label>Rol</label>
          <select class="form-select" id="role">
            <option value="user">Kullanici</option>
            <option value="doctor">Doktor</option>
          </select>
        </div>
        <div class="form-group">
          <label>Sifre</label>
          <input type="password" class="form-input" id="password" placeholder="En az 6 karakter" required autocomplete="new-password">
          <div class="form-error" id="passwordError">Sifre en az 6 karakter olmali</div>
        </div>
        <div class="form-group">
          <label>Sifre Tekrar</label>
          <input type="password" class="form-input" id="confirmPassword" placeholder="Sifrenizi tekrar girin" required>
          <div class="form-error" id="confirmError">Sifreler eslesmiyor</div>
        </div>
        <button type="submit" class="btn btn-primary form-submit" id="registerBtn">Kayit Ol</button>
      </form>
      <div class="form-footer">
        Zaten hesabiniz var mi? <a href="login.html">Giris Yap</a>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { initDNAScene } from './js/dna-scene.js';
    import { isAuthenticated } from './js/auth.js';
    import { signup } from './js/api.js';
    import { redirectIfAuthenticated } from './js/auth.js';

    redirectIfAuthenticated();

    initDNAScene('authCanvas', {
      cameraZ: 8,
      tubeRadius: 0.12,
      starCount: 2000,
    });

    const form = document.getElementById('registerForm');
    const fullName = document.getElementById('fullName');
    const email = document.getElementById('email');
    const phone = document.getElementById('phone');
    const role = document.getElementById('role');
    const password = document.getElementById('password');
    const confirmPw = document.getElementById('confirmPassword');
    const nameErr = document.getElementById('nameError');
    const emailErr = document.getElementById('emailError');
    const phoneErr = document.getElementById('phoneError');
    const passwordErr = document.getElementById('passwordError');
    const confirmErr = document.getElementById('confirmError');
    const registerBtn = document.getElementById('registerBtn');

    function showError(input, el) { input.classList.add('error'); el.classList.add('visible'); }
    function clearError(input, el) { input.classList.remove('error'); el.classList.remove('visible'); }

    fullName.addEventListener('input', () => clearError(fullName, nameErr));
    email.addEventListener('input', () => clearError(email, emailErr));
    phone.addEventListener('input', () => clearError(phone, phoneErr));
    password.addEventListener('input', () => clearError(password, passwordErr));
    confirmPw.addEventListener('input', () => clearError(confirmPw, confirmErr));

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      let valid = true;

      if (!fullName.value.trim()) { showError(fullName, nameErr); valid = false; } else { clearError(fullName, nameErr); }
      if (!email.value || !email.value.includes('@')) { showError(email, emailErr); valid = false; } else { clearError(email, emailErr); }
      if (!phone.value.trim() || phone.value.length < 10) { showError(phone, phoneErr); valid = false; } else { clearError(phone, phoneErr); }
      if (!password.value || password.value.length < 6) { showError(password, passwordErr); valid = false; } else { clearError(password, passwordErr); }
      if (password.value !== confirmPw.value) { showError(confirmPw, confirmErr); valid = false; } else { clearError(confirmPw, confirmErr); }

      if (!valid) return;

      registerBtn.disabled = true;
      registerBtn.textContent = 'Kaydediliyor...';

      try {
        await signup({
          full_name: fullName.value.trim(),
          email: email.value.trim(),
          phone: phone.value.trim(),
          role: role.value,
          password: password.value,
        });
        window.location.href = 'login.html?kayit=basarili';
      } catch (err) {
        const errDiv = document.createElement('div');
        errDiv.style.cssText = 'color:var(--danger);font-size:14px;text-align:center;margin-bottom:16px;padding:12px;background:rgba(239,68,68,0.1);border-radius:8px;border:1px solid rgba(239,68,68,0.2)';
        errDiv.textContent = err.message;
        form.prepend(errDiv);
        setTimeout(() => errDiv.remove(), 4000);
      } finally {
        registerBtn.disabled = false;
        registerBtn.textContent = 'Kayit Ol';
      }
    });
  </script>
</body>
</html>
