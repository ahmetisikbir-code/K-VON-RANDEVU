  <div class="modal-overlay" id="bookModal">
    <div class="modal glass" style="position:relative">
      <button class="modal-close">&times;</button>
      <h2>Yeni Randevu</h2>
      <div class="step-indicators">
        <div class="step-indicator active">1</div>
        <div class="step-indicator">2</div>
        <div class="step-indicator">3</div>
      </div>
      <div id="modalContent"></div>
    </div>
  </div>

  <div class="modal-overlay" id="profileModal">
    <div class="modal glass" style="position:relative">
      <button class="modal-close">&times;</button>
      <h2>Profil</h2>
      <div id="profileContent"></div>
    </div>
  </div>

  <script type="module">
    import { redirectIfNotAuthenticated, getUser, clearToken, getToken } from './js/auth.js';
    import { logout } from './js/api.js';
    import { renderAppointments, setupBookModal } from './js/appointments.js';

    redirectIfNotAuthenticated();

    const user = getUser();
    const avatar = document.getElementById('userAvatar');
    if (user && user.full_name) {
      avatar.textContent = user.full_name.charAt(0).toUpperCase();
    }

    renderAppointments(document.getElementById('appointmentsContainer'));
    setupBookModal();

    document.getElementById('newAppointmentBtn').addEventListener('click', () => {
      window.dispatchEvent(new CustomEvent('open-book-modal'));
    });

    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      await logout();
      window.location.href = 'login.html';
    });

    const sidebar = document.getElementById('sidebar');
    const sidebarToggle = document.getElementById('sidebarToggle');

    if (window.innerWidth <= 768) {
      sidebarToggle.style.display = 'block';
    }

    sidebarToggle.addEventListener('click', () => {
      sidebar.classList.toggle('open');
    });

    window.addEventListener('resize', () => {
      if (window.innerWidth <= 768) {
        sidebarToggle.style.display = 'block';
      } else {
        sidebarToggle.style.display = 'none';
        sidebar.classList.remove('open');
      }
    });

    document.getElementById('whatsappLink').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('whatsappSection').scrollIntoView({ behavior: 'smooth' });
    });

    const profileModal = document.getElementById('profileModal');
    document.getElementById('profileLink').addEventListener('click', (e) => {
      e.preventDefault();
      profileModal.classList.add('open');
      const content = document.getElementById('profileContent');
      if (user) {
        content.innerHTML = `
          <div class="form-group"><label>Ad Soyad</label><input class="form-input" value="${user.full_name || ''}" disabled></div>
          <div class="form-group"><label>E-posta</label><input class="form-input" value="${user.email || ''}" disabled></div>
          <div class="form-group"><label>Telefon</label><input class="form-input" value="${user.phone || ''}" disabled></div>
          <div class="form-group"><label>Rol</label><input class="form-input" value="${user.role === 'doctor' ? 'Doktor' : 'Kullanici'}" disabled></div>
        `;
      } else {
        content.innerHTML = '<p style="text-align:center;color:var(--text-muted)">Profil bilgisi bulunamadi.</p>';
      }
    });

    profileModal.querySelector('.modal-close').addEventListener('click', () => profileModal.classList.remove('open'));
    profileModal.addEventListener('click', (e) => { if (e.target === profileModal) profileModal.classList.remove('open'); });
  </script>
